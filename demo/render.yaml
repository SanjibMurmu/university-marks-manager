services:
  - type: web
    name: university-marks-backend
    env: docker
    rootDir: demo
    envVars:
      - key: PORT
        value: "8080"
      
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
        
      
      - key: ADMIN_EMAIL
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
